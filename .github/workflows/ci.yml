name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Install shfmt
        uses: mfinelli/setup-shfmt@v4

      - name: Install dependencies
        run: just sync

      - name: Run type checks
        run: just type-check

      - name: Run Python linter
        run: just lint-python-check

      - name: Run shell linter
        run: just lint-shell-check

      - name: Run Python formatter
        run: just format-python-check

      - name: Run shell formatter
        run: just format-shell-check

      - name: Run tests
        run: just test
