# This file is managed by github-config. Do not edit manually.
# https://github.com/wpfleger96/github-config
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: lint
            recipe: lint-python-check lint-shell-check
          - name: format
            recipe: format-python-check format-shell-check
          - name: type-check
            recipe: type-check
          - name: test
            recipe: test

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "latest"
          enable-cache: true

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Install shfmt
        uses: mfinelli/setup-shfmt@v4
        if: contains(matrix.recipe, 'shell')

      - name: Install dependencies
        run: just sync

      - name: Run ${{ matrix.name }}
        run: just ${{ matrix.recipe }}

  checks:
    if: always()
    needs: [check]
    runs-on: ubuntu-latest

    steps:
      - name: Verify all checks passed
        run: |
          if [[ "${{ needs.check.result }}" != "success" ]]; then
            echo "One or more checks failed"
            exit 1
          fi

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "latest"
          enable-cache: true

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Install dependencies
        run: just sync

      - name: Run end-to-end tests
        run: just test-e2e
