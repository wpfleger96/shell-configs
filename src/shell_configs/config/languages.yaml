languages:
  - name: go
    command: go
    description: "Go programming language"
    macos:
      method: brew
      package: go
    install_cmd: >-
      sudo rm -rf /usr/local/go &&
      ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/') &&
      VER=$(curl -sL 'https://go.dev/VERSION?m=text' | head -1) &&
      curl -sL "https://go.dev/dl/${VER}.linux-${ARCH}.tar.gz" | sudo tar -C /usr/local -xz

  - name: rust
    command: rustup
    description: "Rust toolchain (via rustup)"
    install_cmd: "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y"
    check_path: "~/.cargo/bin/rustup"

  - name: node
    command: node
    description: "Node.js (via nvm)"
    install_cmd: >-
      curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.0/install.sh | bash &&
      export NVM_DIR="$HOME/.nvm" &&
      . "$NVM_DIR/nvm.sh" &&
      nvm install --lts
    check_path: "~/.nvm/versions/node/v*/bin/node"

  - name: ruby
    command: ruby
    description: "Ruby (via rvm)"
    install_cmd: "curl -sSL https://rvm.io/mpapis.asc | gpg --import - 2>/dev/null; curl -sSL https://rvm.io/pkuczynski.asc | gpg --import - 2>/dev/null; curl -sSL https://get.rvm.io | bash -s stable"
    check_path: "~/.rvm/scripts/rvm"

  - name: flutter
    command: flutter
    description: "Flutter SDK (includes Dart)"
    macos:
      method: brew
      package: flutter
    install_cmd: >-
      sudo rm -rf /usr/local/flutter &&
      ARCHIVE=$(curl -sL 'https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json' |
      python3 -c "import sys,json;d=json.load(sys.stdin);h=d['current_release']['stable'];print(next(r['archive'] for r in d['releases'] if r['hash']==h and r['channel']=='stable'))") &&
      curl -sL "https://storage.googleapis.com/flutter_infra_release/releases/${ARCHIVE}" | sudo tar -xJ -C /usr/local/
    check_path: "/usr/local/flutter/bin/flutter"

  - name: python
    command: uv
    description: "Python (via uv) — bootstrap prerequisite, status-only"
    status_only: true
