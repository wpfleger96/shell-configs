# Package manifest for shell-configs
# Packages required for development environment

packages:
  # System utilities
  - name: bzip2
    command: bzip2
    description: "Block-sorting file compressor (required for .tar.bz2 extraction)"
    linux:
      method: apt

  - name: build-essential
    command: gcc
    description: "GCC/g++/make toolchain for compiling native packages (e.g. Python sdists with C extensions)"
    linux:
      method: apt

  - name: wl-clipboard
    command: wl-copy
    description: "Wayland clipboard command-line utilities (wl-copy / wl-paste)"
    linux:
      method: apt

  # Shell tools
  - name: expect
    command: unbuffer
    description: "Provides unbuffer for line buffering"
    macos:
      method: brew
    linux:
      method: apt

  - name: shellcheck
    command: shellcheck
    description: "Shell script linter"
    macos:
      method: brew
    linux:
      method: apt

  - name: shfmt
    command: shfmt
    description: "Shell script formatter"
    macos:
      method: brew
    linux:
      method: script
      install_cmd: "curl -sS https://webi.sh/shfmt | sh"

  # Infrastructure as Code
  - name: terraform
    command: terraform
    description: "Infrastructure as code tool"
    macos:
      method: brew
      tap: hashicorp/tap
      package: hashicorp/tap/terraform
    linux:
      method: apt
      package: terraform
      repo:
        name: hashicorp
        key_url: https://apt.releases.hashicorp.com/gpg
        source: "deb [arch=amd64] https://apt.releases.hashicorp.com $(lsb_release -cs) main"

  - name: tflint
    command: tflint
    description: "Terraform linter"
    macos:
      method: brew
    linux:
      method: script
      install_cmd: "curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash"

  - name: docker
    command: docker
    description: "Docker container runtime"
    linux:
      method: apt
      package: docker-ce
      repo:
        name: docker
        key_url: https://download.docker.com/linux/ubuntu/gpg
        source: "deb [arch=amd64] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable"

  # Configuration Management
  - name: ansible
    command: ansible-community
    description: "Configuration management tool"
    macos:
      method: brew
    linux:
      method: uv_tool

  - name: ansible-lint
    command: ansible-lint
    description: "Ansible linter"
    macos:
      method: brew
    linux:
      method: uv_tool

  # Development Tools
  - name: gh
    command: gh
    description: "GitHub CLI"
    required: true
    macos:
      method: brew
    linux:
      method: apt
      package: gh
      repo:
        name: github-cli
        key_url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
        source: "deb [arch=amd64] https://cli.github.com/packages stable main"

  - name: just
    command: just
    description: "Task runner"
    macos:
      method: brew
    linux:
      method: script
      install_cmd: "curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to ~/.local/bin"

  - name: pnpm
    command: pnpm
    description: "Fast, disk space efficient Node.js package manager"
    macos:
      method: brew
    linux:
      method: script
      install_cmd: "curl -fsSL https://get.pnpm.io/install.sh | sh -"

  - name: ripgrep
    command: rg
    description: "Fast recursive grep"
    macos:
      method: brew
    linux:
      method: apt

  - name: powershell
    command: pwsh
    description: "PowerShell runtime"
    macos:
      method: brew
      cask: true
    linux:
      method: apt
      package: powershell
      repo:
        name: microsoft
        key_url: https://packages.microsoft.com/keys/microsoft.asc
        source: "deb [arch=amd64] https://packages.microsoft.com/ubuntu/24.04/prod noble main"

  # PowerShell Modules
  - name: PSScriptAnalyzer
    description: "PowerShell script analyzer/linter"
    macos:
      method: pwsh
    linux:
      method: pwsh

  # Database
  - name: sqlite
    command: sqlite3
    description: "SQL database engine"
    macos:
      method: brew
      package: sqlite
    linux:
      method: apt
      package: sqlite3

  # Editors
  - name: code
    command: code
    description: "Visual Studio Code editor"
    macos:
      method: brew
      cask: true
    linux:
      method: apt
      package: code
      repo:
        name: vscode
        key_url: https://packages.microsoft.com/keys/microsoft.asc
        source: "deb [arch=amd64] https://packages.microsoft.com/repos/code stable main"

  - name: cursor
    command: cursor
    description: "Cursor AI code editor"
    macos:
      method: brew
      cask: true
    linux:
      method: script
      install_cmd: >-
        set -e &&
        tmp=$(mktemp -d) &&
        deb_url=$(curl -fsSL "https://cursor.com/api/download?platform=linux-x64&releaseTrack=stable" | python3 -c "import sys,json; print(json.load(sys.stdin)['debUrl'])") &&
        curl -fsSL "$deb_url" -o "$tmp/cursor.deb" &&
        sudo dpkg -i "$tmp/cursor.deb" &&
        rm -rf "$tmp"

  - name: wslu
    command: wslview
    description: "WSL utilities for browser integration"
    wsl_only: true
    linux:
      method: apt

  - name: git-delta
    command: delta
    description: "Syntax-highlighting pager for git"
    required: true
    macos:
      method: brew
    linux:
      method: script
      install_cmd: "curl -sS https://webi.sh/delta | sh"

  - name: enpass
    command: Enpass
    description: "Enpass password manager (desktop app for browser extension)"
    wsl_exclude: true
    linux:
      method: apt
      package: enpass
      extra_packages:
        - libxcb-icccm4
        - libxcb-image0
        - libxcb-keysyms1
        - libxcb-render-util0
      repo:
        name: enpass
        key_url: https://apt.enpass.io/keys/enpass-linux.key
        source: "deb [arch=amd64] https://apt.enpass.io/ stable main"

  - name: enpass-cli
    command: enpass-cli
    description: "Enpass vault CLI for password and secret retrieval"
    linux:
      method: script
      install_cmd: "set -e && tmp=$(mktemp -d) && gh release download --repo hazcod/enpass-cli --pattern '*linux_amd64*' -D \"$tmp\" && unzip -qo \"$tmp\"/*.zip -d \"$tmp\" && find \"$tmp\" -name enpasscli -exec install -m 755 {} ~/.local/bin/enpass-cli \\; && rm -rf \"$tmp\""

  - name: direnv
    command: direnv
    description: "Auto-loads/unloads env vars when entering directories with .envrc"
    macos:
      method: brew
    linux:
      method: apt

  # Text Editors
  - name: vim
    command: vim
    description: "Vim text editor"
    macos:
      method: brew
    linux:
      method: apt

  - name: nano
    command: nano
    description: "Nano text editor"
    macos:
      method: brew
    linux:
      method: apt
