[project]
name = "shell-configs"
version = "0.1.0"
description = "Manage shell configuration files across machines with version control"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [
    { name = "Will" }
]
dependencies = [
    "click>=8.1",
    "rich>=13.0",
    "pyyaml>=6.0",
]

[project.scripts]
shell-configs = "shell_configs.cli:main"

[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = [
    "E",
    "F",
    "W",
    "I",
    "N",
    "UP",
    "B",
    "C4",
    "PIE",
    "RET",
    "SIM",
]
ignore = [
    "E501",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "unit: Unit tests that don't touch the filesystem",
    "integration: Integration tests that modify files",
    "cli: CLI command tests",
]

[dependency-groups]
dev = [
    "pytest>=8.4.2",
    "pytest-cov>=7.0.0",
    "ruff>=0.14.3",
]
